le cx="170" cy="104" r="4" fill="#fff"> <animate attributeName="cy" values="104;98;104" dur="2.6s" repeatCount="indefinite"/> </circle> </g> <g transform="translate(44 36)" filter="url(#glow)"> <text x="0" y="34" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff"> 🚀 Quick Access </text> <text x="0" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="500" fill="#dbeafe"> Click below to open the live demo </text> </g> <g transform="translate(565 38)"> <rect x="0" y="0" width="185" height="64" rx="20" fill="#ffffff"> <animate attributeName="y" values="0;-2;0" dur="2.2s" repeatCount="indefinite"/> </rect> <rect x="0" y="0" width="185" height="64" rx="20" fill="none" stroke="#bfdbfe" stroke-width="2" opacity="0.9"/> <text x="92.5" y="40" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8"> Visit Site </text> </g> </svg>
