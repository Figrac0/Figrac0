<svg width="220" height="64" viewBox="0 0 220 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="btnBg" x1="16" y1="10" x2="204" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <linearGradient id="btnStroke" x1="24" y1="8" x2="196" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.18"/>
    </linearGradient>

    <clipPath id="clipBtn">
      <rect x="6" y="6" width="208" height="52" rx="18"/>
    </clipPath>
  </defs>

  <rect width="220" height="64" fill="#FFFFFF"/>

  <g style="cursor:pointer">
    <rect x="6" y="8" width="208" height="52" rx="18" fill="url(#btnBg)">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -1; 0 0; 0 1; 0 0"
        dur="3.2s"
        repeatCount="indefinite"
      />
    </rect>

    <rect
      x="7"
      y="9"
      width="206"
      height="50"
      rx="17"
      stroke="url(#btnStroke)"
      stroke-width="1.2"
      opacity="0.85"
    />

    <g clip-path="url(#clipBtn)">
      <ellipse cx="36" cy="18" rx="34" ry="12" fill="#FFFFFF" opacity="0.12">
        <animate attributeName="cx" values="-10;230" dur="3.6s" repeatCount="indefinite"/>
      </ellipse>

      <circle cx="28" cy="48" r="2.6" fill="#FFFFFF" opacity="0.32">
        <animate attributeName="cy" values="48;45;48" dur="2s" repeatCount="indefinite"/>
      </circle>

      <circle cx="44" cy="50" r="2.1" fill="#FFFFFF" opacity="0.22">
        <animate attributeName="cy" values="50;47;50" dur="2.4s" repeatCount="indefinite"/>
      </circle>

      <circle cx="188" cy="18" r="2.8" fill="#FFFFFF" opacity="0.26">
        <animate attributeName="cy" values="18;21;18" dur="2.1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(20 18)">
      <rect x="0" y="0" width="18" height="20" rx="4" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.62" stroke-width="1.2"/>
      <path d="M5 7.5H13M5 11.5H13M5 15.5H10.5" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M13 0V5H18" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="1.3" stroke-linejoin="round"/>
    </g>

    <g>
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0.6 -0.6; 0 0; -0.6 0.6; 0 0"
        dur="2.6s"
        repeatCount="indefinite"
      />
      <text
        x="108"
        y="34"
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="13"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="0.2"
      >
        Resume
      </text>
      <text
        x="108"
        y="46"
        text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="8"
        font-weight="600"
        fill="#EDE9FE"
        letter-spacing="1.2"
      >
        PDF
      </text>
    </g>
  </g>
</svg>
